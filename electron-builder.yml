appId: com.gitmanager.app
productName: GitManager
directories:
  output: dist
files:
  - out/**/*
  - resources/**/*
win:
  target: nsis
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target: dmg
  icon: resources/icon.png
linux:
  target: AppImage
  icon: resources/icon.png
